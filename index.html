<body>
    <canvas id="canvas" width="291" height="224"></canvas>
    <script>
        var img = new Image();
        img.crossOrigin = "anonymous";
        img.src = "./test.png";

        var canvas = document.getElementById("canvas");
        var ctx=canvas.getContext("2d");
        ctx.drawImage(img, 0, 0);
    </script>
</body>
